spring.application.name=backend-torneos
server.port=${PORT:8080}

# MySQL Database configuration
spring.datasource.url=jdbc:mysql://${MYSQLHOST:127.0.0.1}:${MYSQLPORT:3306}/${MYSQLDATABASE:railway}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Mailtrap API HTTP (sin SMTP – compatible con Railway)
mailtrap.api-token=${MAILTRAP_API_TOKEN:}
mailtrap.inbox-id=${MAILTRAP_INBOX_ID:}

mail.from-name=${MAIL_FROM_NAME:MatchOn}
mail.from-email=${MAIL_FROM_EMAIL:noreply@matchon.app}
mail.admin=${MAIL_ADMIN:admin@matchon.app}
mail.frontend-url=${FRONTEND_URL:https://proyecto-final-jesus-blazquez-duran.vercel.app}
